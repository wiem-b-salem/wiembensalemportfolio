<section id="hero" class="py-30 flex items-center justify-center relative pt-24 overflow-hidden">
  <!-- Retro Grid Background -->
  <div class="absolute inset-0 bg-[linear-gradient(to_right,#1e293b_1px,transparent_1px),linear-gradient(to_bottom,#1e293b_1px,transparent_1px)] bg-[size:4rem_4rem] [mask-image:radial-gradient(ellipse_60%_50%_at_50%_50%,#000_70%,transparent_100%)] opacity-20 pointer-events-none"></div>

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 w-full relative z-10">
    <div class="text-center space-y-8">
      <!-- Retro Grid Background
      <div class="inline-block">
        <span class="mc-panel px-4 py-2 text-purple-300 text-xl tracking-widest uppercase">
          {{ personalInfo.title }}
        </span>
      </div>-->

      <h1 class="text-5xl md:text-8xl font-pixel tracking-widest text-white drop-shadow-[0_4px_0_#4c1d95] uppercase">
        Hi, I'm <span class="text-pink-400 drop-shadow-[0_4px_0_#9d174d]">{{ personalInfo.name }}</span>
      </h1>

      <p class="font-pixel mt-6 max-w-2xl text-2xl text-blue-200 mx-auto drop-shadow-[0_2px_0_#1e3a8a] tracking-wider">
        {{ personalInfo.tagline }}
      </p>

      <div class="flex flex-col sm:flex-row justify-center gap-6 pt-12">
        <button (click)="scrollTo('projects')" class="mc-btn-primary px-8 py-4 text-2xl uppercase tracking-widest">
          Explore Projects
        </button>
        <a [href]="personalInfo.linkedin" target="_blank" rel="noopener noreferrer"
           class="mc-btn px-6 py-3 text-2xl uppercase tracking-widest inline-flex items-center justify-center">
          LinkedIn
        </a>
        <a [href]="personalInfo.github" target="_blank" rel="noopener noreferrer"
           class="mc-btn px-8 py-4 text-2xl uppercase tracking-widest inline-flex items-center justify-center">
          GitHub
        </a>
        <a [href]="personalInfo.cvUrl" download
           class="mc-btn px-8 py-4 text-2xl uppercase tracking-widest inline-flex items-center justify-center">
          Download CV
        </a>
      </div>
    </div>
  </div>
</section>
