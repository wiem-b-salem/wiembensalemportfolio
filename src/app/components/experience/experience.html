<section id="experience" class="py-24 bg-[#0f1117]">
  <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="text-center mb-16">
      <h2 class="font-pixel text-4xl md:text-5xl font-bold text-white drop-shadow-[0_4px_0_#4c1d95] uppercase tracking-widest inline-block">
        Advancements
      </h2>
    </div>

    <div class="relative border-l-8 border-[#151822] ml-4 md:ml-8 space-y-12">
      @for (exp of experiences; track exp.company) {
        <div class="relative pl-10 md:pl-0">
          <!-- Block node -->
          <div class="hidden md:block absolute -left-[20px] top-4 w-8 h-8 bg-purple-600 border-4 border-t-purple-400 border-l-purple-400 border-b-[#050608] border-r-[#050608]"></div>
          
          <div class="md:ml-12 mc-panel p-8">
            <div class="md:hidden absolute -left-[50px] top-6 w-8 h-8 bg-purple-600 border-4 border-t-purple-400 border-l-purple-400 border-b-[#050608] border-r-[#050608]"></div>
            
            <div class="flex flex-col md:flex-row md:items-center justify-between mb-6">
              <div>
                <h3 class="font-pixel text-3xl font-bold text-white drop-shadow-[0_2px_0_#000] uppercase tracking-wider">{{ exp.role }}</h3>
                <h4 class="font-pixel text-xl text-pink-400 drop-shadow-[0_2px_0_#000] uppercase tracking-widest mt-2">{{ exp.company }}</h4>
              </div>
              <div class="font-pixel mt-4 md:mt-0 text-xl text-slate-300 mc-btn px-4 py-2 inline-block w-fit uppercase tracking-wider">
                {{ exp.duration }}
              </div>
            </div>
            
            <p class="font-pixel text-xl text-slate-300 leading-relaxed drop-shadow-[0_1px_0_#000] tracking-wider">
              {{ exp.description }}
            </p>
          </div>
        </div>
      }
    </div>
  </div>
</section>
