<section id="skills" class="py-24 bg-[#0f1117]">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="text-center mb-16">
      <h2 class="font-pixel text-4xl md:text-5xl font-bold text-white drop-shadow-[0_4px_0_#9d174d] uppercase tracking-widest inline-block">
        Inventory
      </h2>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      @for (category of skillsData; track category.category) {
        <div class="mc-panel p-8">
          <h3 class="font-pixel text-3xl font-bold text-pink-400 drop-shadow-[0_2px_0_#000] mb-8 tracking-wider uppercase">
            {{ category.category }}
          </h3>
          <div class="flex flex-wrap gap-4">
            @for (skill of category.skills; track skill) {
              <span class="mc-btn px-4 py-2 text-xl tracking-wider uppercase cursor-default">
                {{ skill }}
              </span>
            }
          </div>
        </div>
      }
    </div>
  </div>
</section>
