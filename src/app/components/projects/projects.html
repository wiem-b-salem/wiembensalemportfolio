<section id="projects" class="py-24 bg-[#0a0c11]">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="text-center mb-16">
      <h2 class="font-pixel text-4xl md:text-5xl font-bold text-white drop-shadow-[0_4px_0_#1e3a8a] uppercase tracking-widest inline-block">
        Quests Log
      </h2>
      <p class="font-pixel mt-6 text-2xl text-blue-200 drop-shadow-[0_2px_0_#000] max-w-2xl mx-auto tracking-wider">
        Completed missions and artifacts crafted along the way.
      </p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      @for (project of projects; track project.title) {
        <app-project-card [project]="project"></app-project-card>
      }
    </div>
  </div>
</section>
